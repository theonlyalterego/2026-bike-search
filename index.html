<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bike Hunt</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Bike Hunt</h1>
    <p class="subtitle">DC-area medium-frame hardtail search &middot; <span id="date"></span></p>
    <div class="header-controls">
      <button id="toggle-dismissed" class="hdr-btn">Show dismissed</button>
      <button id="clear-dismissed" class="hdr-btn">Restore all</button>
      <span id="dismissed-count" class="dismissed-count"></span>
    </div>
  </header>

  <div id="new-banner" class="new-banner" style="display:none">
    <span id="new-banner-text"></span>
    <button id="new-banner-dismiss" class="hdr-btn">Got it</button>
  </div>

  <nav id="jump">
    <span>Jump to:</span>
    <div id="jump-links"></div>
  </nav>

  <div id="loading" class="loading">Loading results...</div>
  <main id="grid"></main>

  <footer>
    <p>Data from OfferUp, Pinkbike, Craigslist + local shop links. <span id="updated"></span></p>
  </footer>

  <script>
    const BIKES = [
      { name: "Commencal Meta HT",      query: "commencal+meta+ht" },
      { name: "Rocky Mountain Growler", query: "rocky+mountain+growler" },
      { name: "Norco Torrent",         query: "norco+torrent" },
      { name: "Kona Honzo",            query: "kona+honzo" },
      { name: "Giant Fathom",          query: "giant+fathom" },
      { name: "Marin San Quentin",     query: "marin+san+quentin" },
      { name: "Specialized Fuse",      query: "specialized+fuse" },
      { name: "Ragley Marley",         query: "Ragley+Marley" },
      { name: "Mmmbop",                query: "Mmmbop" },
      { name: "Vitues Sentier",        query: "Vitues+Sentier" },
      { name: "Canyon Stoic",          query: "Canyon+Stoic" },
      { name: "Cannondale Habit HT",   query: "Cannondale+Habit+HT" },
    ];

    const SOURCES = [
      { key: "offerup",    label: "OfferUp",    color: "#7b1fa2", url: q => `https://offerup.com/search?q=${q}` },
      { key: "pinkbike",   label: "Pinkbike",   color: "#2e7d32", url: q => `https://www.pinkbike.com/buysell/list/?lat=39.0503&lng=-77.3909&distance=50&q=${q}` },
      { key: "craigslist", label: "Craigslist", color: "#1565c0", url: q => `https://washingtondc.craigslist.org/search/sss?query=${q}` },
    ];

    const REJECTED_KEY = "bike-hunt-dismissed";
    const SEEN_KEY = "bike-hunt-seen";
    let showDismissed = false;

    function getDismissed() {
      try { return new Set(JSON.parse(localStorage.getItem(REJECTED_KEY) || "[]")); }
      catch { return new Set(); }
    }

    function saveDismissed(set) {
      localStorage.setItem(REJECTED_KEY, JSON.stringify([...set]));
    }

    function dismissItem(url) {
      const set = getDismissed();
      set.add(url);
      saveDismissed(set);
      const el = document.querySelector(`.listing-item[data-url="${CSS.escape(url)}"]`);
      if (el) el.classList.add("dismissed");
      updateDismissedUI();
    }

    function undismissItem(url) {
      const set = getDismissed();
      set.delete(url);
      saveDismissed(set);
      const el = document.querySelector(`.listing-item[data-url="${CSS.escape(url)}"]`);
      if (el) el.classList.remove("dismissed");
      updateDismissedUI();
    }

    function clearAllDismissed() {
      localStorage.removeItem(REJECTED_KEY);
      document.querySelectorAll(".listing-item.dismissed").forEach(el => el.classList.remove("dismissed"));
      updateDismissedUI();
    }

    function toggleDismissedVisibility() {
      showDismissed = !showDismissed;
      document.getElementById("toggle-dismissed").textContent =
        showDismissed ? "Hide dismissed" : "Show dismissed";
      document.querySelectorAll(".listing-item.dismissed").forEach(el => {
        el.style.display = showDismissed ? "" : "none";
      });
    }

    function updateDismissedUI() {
      const count = getDismissed().size;
      document.getElementById("dismissed-count").textContent = count ? `${count} dismissed` : "";
    }

    function getSeen() {
      try { return new Set(JSON.parse(localStorage.getItem(SEEN_KEY) || "[]")); }
      catch { return new Set(); }
    }

    function saveSeen(set) {
      localStorage.setItem(SEEN_KEY, JSON.stringify([...set]));
    }

    let newUrls = new Set();

    function markNewItems(data) {
      const seen = getSeen();
      newUrls = new Set();
      const byBike = {};
      (data.results || []).forEach(r => {
        SOURCES.forEach(s => {
          (r.sources[s.key] || []).forEach(item => {
            if (!seen.has(item.url) && !getDismissed().has(item.url)) {
              newUrls.add(item.url);
              const bikeName = r.bike_name;
              if (!byBike[bikeName]) byBike[bikeName] = 0;
              byBike[bikeName]++;
            }
          });
        });
      });
      const banner = document.getElementById("new-banner");
      const text = document.getElementById("new-banner-text");
      const total = newUrls.size;
      if (total > 0) {
        const details = Object.entries(byBike)
          .sort((a, b) => b[1] - a[1])
          .map(([name, count]) => `${name} (${count})`)
          .join(", ");
        text.innerHTML = `<strong>${total} new listing${total > 1 ? "s" : ""}</strong> found &mdash; ${details}`;
        banner.style.display = "block";
      } else {
        banner.style.display = "none";
      }
    }

    function markAllSeen() {
      const seen = getSeen();
      newUrls.forEach(u => seen.add(u));
      saveSeen(seen);
      newUrls.clear();
      document.getElementById("new-banner").style.display = "none";
      document.querySelectorAll(".new-badge").forEach(el => el.remove());
    }

    document.getElementById("new-banner-dismiss").addEventListener("click", markAllSeen);

    document.getElementById("toggle-dismissed").addEventListener("click", toggleDismissedVisibility);
    document.getElementById("clear-dismissed").addEventListener("click", clearAllDismissed);

    document.getElementById("date").textContent = new Date().toLocaleDateString("en-US", {
      weekday: "long", year: "numeric", month: "long", day: "numeric"
    });

    function buildCard(bike, results) {
      const id = bike.name.replace(/\s+/g, "-").toLowerCase();
      const card = document.createElement("article");
      card.className = "card";
      card.id = id;

      const h2 = document.createElement("h2");
      h2.textContent = bike.name;
      card.appendChild(h2);

      const hasAny = SOURCES.some(s => (results[s.key] || []).length > 0);

      if (!hasAny) {
        const none = document.createElement("p");
        none.className = "no-listings";
        none.textContent = "No listings found — try these searches:";
        card.appendChild(none);
        const btns = document.createElement("div");
        btns.className = "btns";
        SOURCES.forEach(s => {
          const btn = document.createElement("a");
          btn.href = s.url(bike.query);
          btn.target = "_blank";
          btn.rel = "noopener";
          btn.className = "btn";
          btn.style.backgroundColor = s.color;
          btn.textContent = s.label;
          btns.appendChild(btn);
        });
        card.appendChild(btns);
        return card;
      }

      SOURCES.forEach(s => {
        const items = results[s.key] || [];
        if (items.length === 0) return;

        const sourceLabel = document.createElement("div");
        sourceLabel.className = "source-label";
        sourceLabel.style.borderLeftColor = s.color;
        sourceLabel.innerHTML = `<span style="color:${s.color}">${s.label}</span> <span class="count">${items.length}</span>`;
        card.appendChild(sourceLabel);

        const list = document.createElement("div");
        list.className = "listing-list";

        const dismissed = getDismissed();
        items.slice(0, 10).forEach(item => {
          const isNew = newUrls.has(item.url);
          const div = document.createElement("div");
          div.className = "listing-item";
          div.dataset.url = item.url;
          if (dismissed.has(item.url)) {
            div.classList.add("dismissed");
            if (!showDismissed) div.style.display = "none";
          }

          if (isNew) {
            const badge = document.createElement("span");
            badge.className = "new-badge";
            badge.textContent = "NEW";
            div.appendChild(badge);
          }

          if (item.img) {
            const imgWrap = document.createElement("div");
            imgWrap.className = "listing-img";
            const img = document.createElement("img");
            img.src = item.img;
            img.alt = item.title;
            img.loading = "lazy";
            imgWrap.appendChild(img);
            div.appendChild(imgWrap);
          }

          const info = document.createElement("div");
          info.className = "listing-info";

          const title = document.createElement("a");
          title.className = "listing-title";
          title.href = item.url;
          title.target = "_blank";
          title.rel = "noopener";
          title.textContent = item.title;
          info.appendChild(title);

          if (item.price) {
            const price = document.createElement("span");
            price.className = "listing-price";
            price.textContent = item.price;
            info.appendChild(price);
          }

          if (item.location) {
            const loc = document.createElement("span");
            loc.className = "listing-location";
            loc.textContent = item.location;
            info.appendChild(loc);
          }

          div.appendChild(info);

          const dismissBtn = document.createElement("button");
          dismissBtn.className = "dismiss-btn";
          dismissBtn.title = dismissed.has(item.url) ? "Restore item" : "Dismiss item";
          dismissBtn.textContent = dismissed.has(item.url) ? "\u21BA" : "\u2715";
          dismissBtn.addEventListener("click", e => {
            e.stopPropagation();
            if (dismissed.has(item.url)) {
              undismissItem(item.url);
              dismissBtn.textContent = "\u2715";
              dismissBtn.title = "Dismiss item";
            } else {
              dismissItem(item.url);
              dismissBtn.textContent = "\u21BA";
              dismissBtn.title = "Restore item";
            }
          });
          div.appendChild(dismissBtn);

          list.appendChild(div);
        });

        card.appendChild(list);

        // "View all" link to source
        const viewAll = document.createElement("a");
        viewAll.className = "view-all";
        viewAll.href = s.url(bike.query);
        viewAll.target = "_blank";
        viewAll.rel = "noopener";
        viewAll.textContent = `View all on ${s.label} →`;
        viewAll.style.color = s.color;
        card.appendChild(viewAll);
      });

      return card;
    }

    function render(data) {
      const grid = document.getElementById("grid");
      const jump = document.getElementById("jump-links");
      const loading = document.getElementById("loading");
      loading.style.display = "none";

      markNewItems(data);

      const lookup = {};
      (data.results || []).forEach(r => { lookup[r.bike_name] = r.sources; });

      BIKES.forEach(bike => {
        const a = document.createElement("a");
        a.href = `#${bike.name.replace(/\s+/g, "-").toLowerCase()}`;
        a.textContent = bike.name;
        jump.appendChild(a);

        const card = buildCard(bike, lookup[bike.name] || {});
        grid.appendChild(card);
      });

      // Buyer's guide card
      const guideCard = document.createElement("article");
      guideCard.className = "card";
      guideCard.id = "buyers-guide";
      const guideToggle = document.createElement("button");
      guideToggle.className = "collapse-btn";
      guideToggle.textContent = "\u25BC Buyer's Guide";
      let guideExpanded = false;
      guideToggle.addEventListener("click", () => {
        guideExpanded = !guideExpanded;
        guideBody.style.display = guideExpanded ? "" : "none";
        guideToggle.textContent = guideExpanded ? "\u25B2 Buyer's Guide" : "\u25BC Buyer's Guide";
      });
      guideCard.appendChild(guideToggle);

      const guideBody = document.createElement("div");
      guideBody.style.display = "none";
      guideBody.innerHTML = `
        <table class="guide-table">
          <tr><th>Category</th><th>What to Look For</th></tr>
          <tr>
            <td>Frame / Geometry</td>
            <td><strong>Head tube angle:</strong> 64&ndash;67&deg; (slack = stable).<br><strong>Size:</strong> Medium &mdash; always check the brand&rsquo;s geometry chart against your height.</td>
          </tr>
          <tr>
            <td>Fork / Suspension</td>
            <td><strong>Travel:</strong> 130&ndash;150mm for trail + dirt jump versatility.<br><strong>Check used:</strong> stanchions must be free of scratches, pitting, and oil leaks (costly to fix).</td>
          </tr>
          <tr>
            <td>Drivetrain</td>
            <td><strong>1x (single chainring)</strong> &mdash; simpler, lighter, better chain retention for rough riding.</td>
          </tr>
          <tr>
            <td>Dropper Post</td>
            <td><strong>Essential.</strong> Lets you drop the saddle for descents / jumps and raise it for climbs, all from the handlebar.</td>
          </tr>
          <tr>
            <td>Tires</td>
            <td>
              <strong>Volume (width):</strong> 2.3&ndash;2.5" sweet spot &mdash; wider = lower pressure + more cushion on a hardtail.<br>
              <strong>Wheel size:</strong> 27.5" (more playful, flickable) vs 29" (rolls over obstacles better, holds speed).<br>
              <strong>Tubeless:</strong> ask if tubeless-ready &mdash; lets you run lower pressures without pinch flats.<br>
              <strong>Tread:</strong> knobby sides for cornering grip, tighter center for rolling efficiency.<br>
              <strong>Squeeze test:</strong> tires should have some &ldquo;give&rdquo; &mdash; rock-hard means over-inflated.
            </td>
          </tr>
        </table>
      `;
      guideCard.appendChild(guideBody);
      grid.appendChild(guideCard);

      // Local shops card
      const lbsCard = document.createElement("article");
      lbsCard.className = "card";
      lbsCard.id = "local-shops";
      const lbsH2 = document.createElement("h2");
      lbsH2.textContent = "Local Used Bike Shops";
      lbsCard.appendChild(lbsH2);

      const shops = [
        { name: "Trek Red Barn Refresh (Reston/Fairfax)", url: "https://www.trekbikes.com/us/en_US/pre-owned-bikes/c/RBR100/", desc: "Certified pre-owned Trek - nationwide shipping or local pickup" },
        { name: "REI Re/Supply Cycling (Fairfax)", url: "https://www.rei.com/used/cycling", desc: "Used bikes & gear, any brand - REI membership required" },
        { name: "Phoenix Bikes (Arlington)", url: "https://phoenixbikes-non-profit.company.site/", desc: "Nonprofit - exclusively used/refurbished bikes" },
        { name: "Bikes@Vienna Used (Vienna)", url: "https://www.bikesatvienna.com/usedbikesandtrikes", desc: "Used recumbents & trikes, some conventional bikes" },
        { name: "The Bike Shop Used (Centreville)", url: "https://thecentrevillebikeshop.com/used-bikes/", desc: "In-store used selection - call Jeff to inquire" },
      ];

      const lbsList = document.createElement("div");
      lbsList.className = "listing-list";
      shops.forEach(shop => {
        const div = document.createElement("div");
        div.className = "listing-item";
        const info = document.createElement("div");
        info.className = "listing-info";
        const link = document.createElement("a");
        link.className = "listing-title";
        link.href = shop.url;
        link.target = "_blank";
        link.rel = "noopener";
        link.textContent = shop.name;
        info.appendChild(link);
        const desc = document.createElement("span");
        desc.className = "listing-location";
        desc.textContent = shop.desc;
        info.appendChild(desc);
        div.appendChild(info);
        lbsList.appendChild(div);
      });
      lbsCard.appendChild(lbsList);
      grid.appendChild(lbsCard);

      document.getElementById("updated").textContent =
        `Last updated ${new Date(data.fetched_at).toLocaleString()}`;
      updateDismissedUI();
    }

    fetch("data/listings.json")
      .then(r => {
        if (!r.ok) throw new Error("Not found");
        return r.json();
      })
      .then(render)
      .catch(() => {
        // Fallback: show search links
        document.getElementById("loading").textContent = "Could not load listings. Showing search links instead.";
        render({ results: [] });
      });
  </script>
</body>
</html>
